<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyCity Mobile Preview</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17201c;
      --muted: #5f6d67;
      --canvas: #f4f6f5;
      --surface: #ffffff;
      --border: #dde5e1;
      --green: #08745f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--canvas);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 28px;
      padding: 28px;
    }

    .panel {
      align-self: start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button,
    a.button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      min-height: 42px;
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    button.active {
      border-color: var(--green);
      background: #e3f1ec;
      color: var(--green);
    }

    .stage {
      min-width: 0;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 8px;
    }

    .device {
      width: var(--device-width, 390px);
      height: var(--device-height, 844px);
      max-width: calc(100vw - 440px);
      max-height: calc(100vh - 56px);
      background: #0f1714;
      border: 10px solid #0f1714;
      border-radius: 34px;
      box-shadow: 0 24px 80px rgba(23, 32, 28, 0.20);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
        padding: 16px;
        gap: 16px;
      }

      .stage {
        order: -1;
        padding: 0;
      }

      .device {
        max-width: calc(100vw - 32px);
        max-height: 66vh;
      }

      .panel {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel" aria-label="Preview controls">
      <div class="brand">
        <div class="mark">MC</div>
        <div>
          <h1>MyCity mobile preview</h1>
          <p>Use this page in Antigravity Preview to inspect the Flutter app at mobile sizes.</p>
        </div>
      </div>

      <div class="controls">
        <button class="active" type="button" data-size="390x844">iPhone 14</button>
        <button type="button" data-size="412x915">Pixel 8</button>
        <button type="button" data-size="430x932">Large phone</button>
        <button type="button" data-size="768x1024">Tablet</button>
        <a class="button" href="./index.html" target="_blank" rel="noreferrer">Open app only</a>
      </div>
    </section>

    <section class="stage" aria-label="Mobile app preview">
      <div class="device" id="device">
        <iframe title="MyCity app" src="./index.html"></iframe>
      </div>
    </section>
  </main>

  <script>
    const device = document.querySelector("#device");
    const buttons = document.querySelectorAll("button[data-size]");

    for (const button of buttons) {
      button.addEventListener("click", () => {
        const [width, height] = button.dataset.size.split("x");
        device.style.setProperty("--device-width", `${width}px`);
        device.style.setProperty("--device-height", `${height}px`);
        for (const item of buttons) item.classList.toggle("active", item === button);
      });
    }
  </script>
</body>
</html>
