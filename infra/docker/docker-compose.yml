services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    working_dir: /workspace
    command: sh -c "npm run backend:migrate && npm run backend:seed && npm run backend:dev"
    environment:
      PORT: 4000
      API_PREFIX: api/v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_city
      DB_SYNC: "false"
      DB_MIGRATIONS_RUN: "false"
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_REQUIRED: "true"
      JWT_AUDIENCE: my-city-mobile
      JWT_ISSUER: my-city
      JWT_ACCESS_SECRET: replace-me-access
      JWT_REFRESH_SECRET: replace-me-refresh
      ENABLE_NOTIFICATION_WORKER: "true"
      NOTIFICATION_WORKER_INTERVAL_MS: 3000
      FCM_PROJECT_ID: ""
      FCM_CLIENT_EMAIL: ""
      FCM_PRIVATE_KEY: ""
      STORAGE_BUCKET: local-my-city
      STORAGE_REGION: us-east-1
      STORAGE_ENDPOINT: ""
      STORAGE_PUBLIC_BASE_URL: https://local.example.invalid/uploads
      STORAGE_ACCESS_KEY_ID: local-access-key
      STORAGE_SECRET_ACCESS_KEY: local-secret-key
      STORAGE_FORCE_PATH_STYLE: "false"
      STORAGE_SIGNED_URL_EXPIRES_SECONDS: 900
    ports:
      - "${BACKEND_PUBLISH_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/v1/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - ../..:/workspace
      - backend_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_city
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_city"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@mycity.example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PUBLISH_PORT:-5050}:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  backend_node_modules:
