apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-city-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-city-api
  template:
    metadata:
      labels:
        app: my-city-api
    spec:
      containers:
        - name: api
          image: my-city/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: my-city-api-config
            - secretRef:
                name: my-city-api-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
