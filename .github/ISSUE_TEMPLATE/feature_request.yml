name: Feature request
description: Propose a new feature or a significant improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem are we solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed solution.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and what changes in practice?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Mobile
        - Infrastructure
        - CI/CD
        - Documentation
    validations:
      required: true

