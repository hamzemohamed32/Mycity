name: Bug report
description: Report a defect in the backend, mobile app, or infrastructure.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect clearly.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Start the stack
        2. Open the app
        3. Submit a complaint
        4. Observe the failure
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Mobile
        - Docker
        - Database
        - Redis
        - CI
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include local OS, emulator/device, and relevant versions.

